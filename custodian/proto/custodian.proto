syntax = "proto3";

package custodian;

import "google/protobuf/timestamp.proto";

// Custodian service for ticket lifecycle management with distributed locking
service CustodianService {
  // Create a new ticket
  rpc CreateTicket(CreateTicketRequest) returns (Ticket);

  // Acquire an exclusive lock on a ticket
  rpc AcquireLock(LockRequest) returns (LockResponse);

  // Release a lock on a ticket
  rpc ReleaseLock(LockRelease) returns (LockResponse);

  // Update an existing ticket
  rpc UpdateTicket(UpdateTicketRequest) returns (Ticket);

  // Get a ticket by ID
  rpc GetTicket(GetTicketRequest) returns (Ticket);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);

  // Get cluster status (leader, followers, etc.)
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
}

// Raft consensus service for inter-node communication
service RaftService {
  // Append entries RPC (send log entries to followers)
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);

  // Vote RPC (request votes during leader election)
  rpc Vote(VoteRequest) returns (VoteResponse);

  // Install snapshot RPC (send snapshot data to followers)
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// Ticket creation request
message CreateTicketRequest {
  string title = 1;
  string project = 2;
  string account_uuid = 3;
  Symptom symptom = 4;
  string created_by_uuid = 5;
  optional string customer_ticket_number = 6;
  optional string isp_ticket_number = 7;
  optional string other_ticket_number = 8;
  optional string ebond = 9;
  optional string tracking_url = 10;
  repeated NetworkDevice network_devices = 11;
}

message GetTicketRequest {
  uint64 ticket_id = 1;
}

// Lock acquisition request
message LockRequest {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}

// Lock release request
message LockRelease {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}

// Lock operation response
message LockResponse {
  bool success = 1;
  string error = 2;
  optional string current_holder = 3;
}

// Ticket update request
message UpdateTicketRequest {
  uint64 ticket_id = 1;
  optional string title = 2;
  optional string project = 3;
  optional Symptom symptom = 4;
  optional TicketStatus status = 5;
  optional NextAction next_action = 6;
  optional Resolution resolution = 7;
  optional string assigned_to_uuid = 8;
  optional string updated_by_uuid = 9;
  optional string ebond = 10;
  optional string tracking_url = 11;
  repeated NetworkDevice network_devices = 12;
}

// Ticket data structure
message Ticket {
  uint64 ticket_id = 1;
  optional string customer_ticket_number = 2;
  optional string isp_ticket_number = 3;
  optional string other_ticket_number = 4;
  string title = 5;
  string project = 6;
  string account_uuid = 7;
  Symptom symptom = 8;
  TicketStatus status = 9;
  NextAction next_action = 10;
  optional Resolution resolution = 11;
  optional string locked_by_uuid = 12;
  optional string assigned_to_uuid = 13;
  string created_by_uuid = 14;
  google.protobuf.Timestamp created_at = 15;
  string updated_by_uuid = 16;
  google.protobuf.Timestamp updated_at = 17;
  repeated HistoryEntry history = 18;
  optional string ebond = 19;
  optional string tracking_url = 20;
  repeated NetworkDevice network_devices = 21;
  uint32 schema_version = 22;
}

// History entry for audit trail
message HistoryEntry {
  string user_uuid = 1;
  google.protobuf.Timestamp timestamp = 2;
  string action = 3;
  string details = 4;
}

// Symptom categories
enum Symptom {
  SYMPTOM_UNSPECIFIED = 0;
  NO_INTERNET = 1;
  SLOW_INTERNET = 2;
  INTERMITTENT_CONNECTIVITY = 3;
  WIFI_ISSUES = 4;
  DEVICE_CONFIGURATION = 5;
  BILLING_QUESTION = 6;
  SERVICE_UPGRADE = 7;
  HARDWARE_FAILURE = 8;
  OTHER = 9;
}

// Ticket status
enum TicketStatus {
  TICKET_STATUS_UNSPECIFIED = 0;
  OPEN = 1;
  AWAITING_CUSTOMER = 2;
  AWAITING_ISP = 3;
  CLOSED = 4;
  AUTO_CLOSED = 5;
}

// Next action
enum NextAction {
  NEXT_ACTION_UNSPECIFIED = 0;
  DIAGNOSE_ISSUE = 1;
  CONTACT_CUSTOMER = 2;
  CONTACT_ISP = 3;
  REPLACE_EQUIPMENT = 4;
  UPDATE_CONFIGURATION = 5;
  CLOSE_TICKET = 6;
}

// Resolution
enum Resolution {
  RESOLUTION_UNSPECIFIED = 0;
  FIXED = 1;
  UNABLE_TO_REPRODUCE = 2;
  CUSTOMER_EDUCATION = 3;
  EQUIPMENT_REPLACEMENT = 4;
  SERVICE_UPGRADE_RESOLVED = 5;
  CANCELLED = 6;
  ESCALATED = 7;
}

// Network device types
message NetworkDevice {
  oneof device_type {
    DslModem dsl_modem = 1;
    CoaxModem coax_modem = 2;
    Ont ont = 3;
    FixedWirelessAntenna fixed_wireless_antenna = 4;
    VpnGw vpn_gw = 5;
    Switch switch = 6;
    Router router = 7;
    Firewall firewall = 8;
  }
}

message DslModem {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message CoaxModem {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Ont {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message FixedWirelessAntenna {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message VpnGw {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Switch {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Router {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

message Firewall {
  string make = 1;
  string model = 2;
  optional string mac_address = 3;
  optional string serial_number = 4;
}

// Health check messages
message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string status = 2;
}

// Cluster status messages
message ClusterStatusRequest {}

message ClusterStatusResponse {
  string leader_id = 1;
  repeated string follower_ids = 2;
  uint64 term = 3;
  uint64 commit_index = 4;
}

// Raft consensus messages (simplified for custodian)
message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
}

message VoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message VoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  bytes data = 5;
  bool done = 6;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

message LogEntry {
  uint64 term = 1;
  uint64 index = 2;
  LockCommand command = 3;
}

// Lock commands for Raft log
message LockCommand {
  oneof command_type {
    AcquireLockCommand acquire_lock = 1;
    ReleaseLockCommand release_lock = 2;
  }
}

message AcquireLockCommand {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}

message ReleaseLockCommand {
  uint64 ticket_id = 1;
  string user_uuid = 2;
}