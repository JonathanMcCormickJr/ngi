name: Rust CI (parallel)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # -------------------------------------------------
  # 1️⃣ Formatting
  # -------------------------------------------------
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

  # -------------------------------------------------
  # 2️⃣ Clippy (depends on fmt)
  # -------------------------------------------------
  clippy:
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore index cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # -------------------------------------------------
  # 3️⃣ Build (depends on clippy)
  # -------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: clippy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore index cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose --all-targets --all-features

  # -------------------------------------------------
  # 4️⃣ Test (depends on build)
  # -------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore index cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose --all-targets --all-features

  # -------------------------------------------------
  # 5️⃣ Coverage (depends on test)
  # -------------------------------------------------
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches (registry + index + build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-all-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo‑tarpaulin (pinned)
        run: cargo install cargo-tarpaulin@0.24.0 --locked

      - name: Run coverage
        run: cargo tarpaulin --workspace --out Markdown --fail-under 90

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.md   # adjust if you rename the output file

  # -------------------------------------------------
  # 6️⃣ Dependency audit (depends on test)
  # -------------------------------------------------
  audit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches (registry + index + build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-all-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo‑audit (pinned)
        run: cargo install cargo-audit@0.18.0 --locked

      - name: Run audit
        run: cargo audit --json > audit-report.json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json

  # -------------------------------------------------
  # 7️⃣ Supply chain security (depends on test)
  # -------------------------------------------------
  supply-chain:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-all-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deny
        run: cargo install cargo-deny@0.14.0 --locked

      - name: Check licenses and bans
        run: cargo deny check

      - name: Generate SBOM
        run: |
          cargo install cargo-sbom
          cargo sbom > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  # -------------------------------------------------
  # 8️⃣ Secret scanning (runs independently)
  # -------------------------------------------------
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # -------------------------------------------------
  # 9️⃣ Unsafe code detection (depends on build)
  # -------------------------------------------------
  unsafe-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-all-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-geiger
        run: cargo install cargo-geiger@0.11.0 --locked

      - name: Check for unsafe code
        run: |
          cargo geiger --output-format GitHubMarkdown > unsafe-report.md
          # Fail if unsafe code found in workspace crates (not dependencies)
          if cargo geiger | grep -E "^(admin|auth|chaos|custodian|db|honeypot|lbrp|tests)" | grep -v "0/0"; then
            echo "ERROR: Unsafe code detected in workspace crates"
            exit 1
          fi

      - name: Upload unsafe code report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unsafe-report
          path: unsafe-report.md

  # -------------------------------------------------
  # 🔟 Lock file integrity check
  # -------------------------------------------------
  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.lock is committed
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "ERROR: Cargo.lock not found. Lock file must be committed."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Cargo.lock is up-to-date
        run: |
          cargo fetch --locked
          if ! git diff --quiet Cargo.lock; then
            echo "ERROR: Cargo.lock is out of sync with Cargo.toml"
            git diff Cargo.lock
            exit 1
          fi