[report]
# Require 90% coverage for code that matters
# Skeleton main() functions are placeholders and will be replaced

[exclude]
# Exclude skeleton service main functions from coverage
# These are "Hello, world!" placeholders
exclude = [
    "*/main.rs:main",
]

# Exclude the web (WASM) crate: cargo-tarpaulin cannot instrument WebAssembly
# targets compiled with wasm32-unknown-unknown, so web/* always reports 0%.
exclude-files = [
    "web/src/*",
]
