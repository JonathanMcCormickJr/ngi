# cargo-deny configuration for NGI supply chain security
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# Ensure all dependencies use permissive licenses compatible with our project
unlicensed = "deny"
copyleft = "warn"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-DFS-2016",
    "Unlicense",
    "CC0-1.0",
    "WTFPL",
    "BSL-1.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Prevent known-vulnerable or undesirable crates
multiple-versions = "warn"  # Warn about multiple versions of same crate
wildcards = "warn"          # Discourage version wildcards in Cargo.toml
highlight = "all"

deny = [
    # Example: ban old/vulnerable crates
    # { name = "openssl", version = "<0.10.0" },
]

skip = [
    # Add crates that legitimately need multiple versions
]

skip-tree = [
    # Skip entire dependency trees if needed
]

[advisories]
# Check RustSec advisory database for known vulnerabilities
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
unsound = "warn"
yanked = "deny"
notice = "warn"
ignore = [
    # Example: temporarily ignore specific advisories
    # "RUSTSEC-2020-0071",
]

[sources]
# Restrict dependency sources to prevent supply chain attacks
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
